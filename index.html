<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg: #f8fafc;
  --bg2: #ffffff;
  --bg3: #f1f5f9;
  --bg4: #e2e8f0;
  --text: #0f172a;
  --text2: #475569;
  --text3: #64748b;
  
  /* Modern Colors */
  --red: #ef4444; --red-bg: #fef2f2; --red-border: #fca5a5;
  --orange: #f97316; --orange-bg: #fff7ed; --orange-border: #fdba74;
  --yellow: #eab308; --yellow-bg: #fefce8; --yellow-border: #fde047;
  --green: #22c55e; --green-bg: #f0fdf4; --green-border: #86efac;
  --blue: #3b82f6; --blue-bg: #eff6ff; --blue-border: #93c5fd;
  
  --accent: #4f46e5;
  --accent-bg: #e0e7ff;
  --accent-hover: #4338ca;
  
  --card-border: #e2e8f0;
  --radius-lg: 24px;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.02);
  --shadow-float: 0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.04);
  
  --font: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  
  --bz-fill: #e2e8f0; --bz-stroke: #cbd5e1; --bz-hover: #cbd5e1; --bz-on: #e0e7ff; --bz-on-s: var(--accent);
  --bz-grad1: #f1f5f9; --bz-grad2: #ffffff;
}

.dark {
  --bg: #0f172a;
  --bg2: #1e293b;
  --bg3: #334155;
  --bg4: #475569;
  --text: #f8fafc;
  --text2: #cbd5e1;
  --text3: #94a3b8;
  
  --red: #f87171; --red-bg: rgba(239,68,68,0.15); --red-border: rgba(239,68,68,0.3);
  --orange: #fb923c; --orange-bg: rgba(249,115,22,0.15); --orange-border: rgba(249,115,22,0.3);
  --yellow: #facc15; --yellow-bg: rgba(234,179,8,0.15); --yellow-border: rgba(234,179,8,0.3);
  --green: #4ade80; --green-bg: rgba(34,197,94,0.15); --green-border: rgba(34,197,94,0.3);
  --blue: #60a5fa; --blue-bg: rgba(59,130,246,0.15); --blue-border: rgba(59,130,246,0.3);
  
  --accent: #818cf8;
  --accent-bg: rgba(99,102,241,0.15);
  --accent-hover: #a5b4fc;
  
  --card-border: #334155;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4);
  --shadow-float: 0 25px 50px -12px rgb(0 0 0 / 0.5);
  
  --bz-fill: #1e293b; --bz-stroke: #334155; --bz-hover: #475569; --bz-on: rgba(99,102,241,0.2); --bz-on-s: var(--accent);
  --bz-grad1: #0f172a; --bz-grad2: #1e293b;
}

html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

.app { max-width: 1000px; margin: 0 auto; padding: 20px }
header { text-align: center; padding: 30px 16px 20px; position: relative; }
header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 4px; }
header h1 .hl { background: linear-gradient(135deg, var(--accent), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header h1 .sub { font-weight: 500; font-size: 0.9rem; color: var(--text3); display: block; -webkit-text-fill-color: var(--text3); background: none; }
.hr { position: absolute; top: 16px; right: 16px; }
.hb { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--card-border); background: var(--bg2); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.2s; box-shadow: var(--shadow-sm); }
.hb:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }

.disc { background: var(--orange-bg); border: 1px solid var(--orange-border); border-radius: var(--radius-sm); padding: 12px 16px; margin: 16px auto 0; max-width: 680px; font-size: 0.8rem; color: var(--orange); text-align: center; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }
.disc i { font-size: 1.2rem; }

/* Modern Tabs */
.nav-tabs { display: flex; gap: 6px; padding: 6px; background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius-lg); margin: 24px 0; overflow-x: auto; box-shadow: var(--shadow); position: sticky; top: 12px; z-index: 50; }
.nav-tabs::-webkit-scrollbar { display: none; }
.nt { flex: 1 0 auto; padding: 10px 16px; border: none; background: transparent; color: var(--text2); font-family: var(--font); font-size: 0.85rem; font-weight: 600; border-radius: 100px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 6px; }
.nt i { font-size: 1.1rem; }
.nt:hover { color: var(--text); background: var(--bg3); }
.nt.on { color: #fff; background: var(--accent); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }

.pnl { display: none; animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(10px); }
.pnl.on { display: block; }
@keyframes fadeUp { to { opacity: 1; transform: none; } }

/* Search & Inputs */
.sb { position: relative; margin-bottom: 16px; }
.sb input { width: 100%; padding: 14px 16px 14px 44px; background: var(--bg2); border: 2px solid var(--card-border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 1rem; font-weight: 500; outline: none; transition: all 0.2s; box-shadow: var(--shadow-sm); }
.sb input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-bg); }
.sb input::placeholder { color: var(--text3); font-weight: 400; }
.sb i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 1.2rem; pointer-events: none; }
.hint { font-size: 0.8rem; color: var(--text3); margin-top: 4px; padding-left: 4px; font-weight: 500; }

/* Cards */
.card { background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: transparent; transition: background 0.2s; }
.card:hover::after { background: var(--accent); }

.ch { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.ct { font-weight: 700; font-size: 1.05rem; color: var(--text); }
.cs { font-size: 0.85rem; color: var(--text2); }

.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag { font-size: 0.7rem; padding: 4px 10px; border-radius: 100px; font-weight: 600; background: var(--bg3); color: var(--text2); border: 1px solid var(--card-border); }
.tag.m { background: var(--accent-bg); color: var(--accent); border-color: transparent; }

.tb { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; }
.tb-1 { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.tb-2 { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
.tb-3 { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
.tb-4 { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.tb-5 { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
.td { width: 8px; height: 8px; border-radius: 50%; display: inline-block; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
.td-1 { background: var(--red); } .td-2 { background: var(--orange); } .td-3 { background: var(--yellow); } .td-4 { background: var(--green); } .td-5 { background: var(--blue); }

.rbar { display: flex; align-items: center; margin-bottom: 12px; font-size: 0.85rem; color: var(--text2); font-weight: 500; }
.rbar b { color: var(--text); margin-right: 4px; font-weight: 700; }
.frow { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.fb { padding: 6px 14px; border: 1px solid var(--card-border); background: var(--bg2); color: var(--text2); font-family: var(--font); font-size: 0.8rem; font-weight: 600; border-radius: 100px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow-sm); }
.fb:hover { border-color: var(--text3); color: var(--text); }
.fb.a { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2); }

/* Levels */
.lc { border-radius: var(--radius); padding: 20px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.lc h3 { font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.lc .tm { font-size: 0.85rem; font-weight: 600; font-family: var(--mono); }
.lc .ds { font-size: 0.9rem; line-height: 1.6; opacity: 0.9; }
.lc::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; }
.lc-1 { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); } .lc-1::before { background: var(--red); }
.lc-2 { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); } .lc-2::before { background: var(--orange); }
.lc-3 { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); } .lc-3::before { background: var(--yellow); }
.lc-4 { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); } .lc-4::before { background: var(--green); }
.lc-5 { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); } .lc-5::before { background: var(--blue); }

/* Overlay Elements */
.triage-banner { padding: 16px 20px; border-radius: var(--radius); margin: 16px 0 20px; display: flex; align-items: center; justify-content: space-between; font-weight: 800; font-size: 1.2rem; transition: all 0.3s ease; box-shadow: var(--shadow); }
.triage-banner .t-time { font-size: 0.85rem; opacity: 0.9; font-weight: 700; font-family: var(--mono); background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 100px; }
.t-b-1{background:var(--red);color:#fff;}
.t-b-2{background:var(--orange);color:#fff;}
.t-b-3{background:var(--yellow);color:#000;}
.t-b-4{background:var(--green);color:#fff;}
.t-b-5{background:var(--blue);color:#fff;}

.rule-box { background: var(--bg3); padding: 14px 16px; border-radius: var(--radius-sm); margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start; cursor: pointer; transition: all 0.2s; border: 1px solid var(--card-border); }
.rule-box:hover { background: var(--bg4); }
.rule-box.active { background: var(--accent-bg); border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
.rule-box input { margin-top: 4px; width: 18px; height: 18px; accent-color: var(--accent); pointer-events: none; }
.rule-txt { font-size: 0.95rem; font-weight: 700; color: var(--text); line-height: 1.3; }
.rule-sub { font-size: 0.8rem; color: var(--text3); display: block; margin-top: 4px; font-weight: 500; }

.ind-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--card-border); cursor: pointer; transition: background 0.2s; border-radius: var(--radius-xs); }
.ind-row:hover { background: var(--bg3); }
.ind-row input { margin-top: 3px; width: 18px; height: 18px; accent-color: var(--accent); pointer-events: none; }
.ind-txt { font-size: 0.9rem; color: var(--text); line-height: 1.4; }
.ind-head { padding: 8px 14px; font-weight: 800; font-size: 0.85rem; color: #fff; margin-top: 12px; border-radius: var(--radius-xs); display: flex; align-items: center; gap: 8px; }

/* Dynamische Vitals */
.vitals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-bottom: 20px; }
.vital-input-box { background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius-sm); padding: 10px; text-align: center; box-shadow: var(--shadow-sm); transition: all 0.2s; }
.vital-input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.vital-input-box label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.vital-input-box input { width: 100%; text-align: center; font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--text); border: none; background: transparent; padding: 4px; outline: none; }

/* ===== BODYMAP ===== */
.bm-page { display: flex; flex-direction: column; align-items: center; }
.bm-hint { text-align: center; color: var(--text); font-size: 0.9rem; margin-bottom: 20px; font-weight: 700; }
.bm-hint span { color: var(--text3); font-weight: 500; font-size: 0.8rem; display: block; margin-top: 4px; }
.bm-main { display: flex; gap: 30px; align-items: flex-start; width: 100%; }
.bm-figs { flex: 0 0 auto; display: flex; gap: 12px; position: sticky; top: 20px; }
.bm-fig { width: 180px; background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 16px 10px 12px; box-shadow: var(--shadow); text-align: center; }
.bm-fig svg { width: 100%; height: auto; display: block; }
.bm-fig svg .bz { fill: var(--bz-fill); stroke: var(--bz-stroke); stroke-width: 1; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); stroke-linejoin: round; stroke-linecap: round; }
.bm-fig svg .bz:hover { fill: var(--bz-hover); stroke: var(--text3); }
.bm-fig svg .bz.on { fill: var(--bz-on); stroke: var(--bz-on-s); stroke-width: 2; filter: drop-shadow(0 0 8px rgba(79, 70, 229, 0.3)); }
.bm-fig svg .bl { fill: var(--text3); font-family: var(--font); font-weight: 700; pointer-events: none; user-select: none; }
.bm-fig-lbl { font-size: 0.75rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 10px; }
.bm-pills { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 16px; max-width: 380px; }
.bm-pill { padding: 8px 16px; border: 1px solid var(--card-border); background: var(--bg2); color: var(--text2); font-family: var(--font); font-size: 0.8rem; font-weight: 600; border-radius: 100px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 6px; }
.bm-pill i { font-size: 1.1rem; }
.bm-pill:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
.bm-pill.on { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
.bm-side { flex: 1; min-width: 0; }
.bm-side h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; color: var(--text); }
.bm-side .sub { font-size: 0.85rem; color: var(--text3); margin-bottom: 16px; font-weight: 500; }
.bm-di { padding: 14px 16px; background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: var(--shadow-sm); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.bm-di:hover { border-color: var(--accent); transform: translateX(4px); box-shadow: var(--shadow); }
.bm-di strong { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.bm-di span { font-size: 0.8rem; color: var(--text3); font-family: var(--mono); }
.bm-empty { color: var(--text3); font-size: 0.9rem; padding: 40px 20px; text-align: center; font-weight: 500; background: var(--bg2); border: 1px dashed var(--card-border); border-radius: var(--radius); }

/* Cheatsheet */
.cg { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.cc { background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); transition: transform 0.2s; }
.cc:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.cc h4 { font-size: 0.95rem; font-weight: 800; margin-bottom: 10px; color: var(--text); border-bottom: 2px solid var(--bg3); padding-bottom: 8px; }
.cc ul { list-style: none; }
.cc li { font-size: 0.85rem; color: var(--text2); padding: 4px 0 4px 20px; position: relative; line-height: 1.5; font-weight: 500; }
.cc li i { position: absolute; left: 0; top: 6px; color: var(--accent); font-size: 0.9rem; }

/* Stats */
.sr { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.sx { background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow); }
.sx .n { font-size: 1.8rem; font-weight: 800; font-family: var(--mono); color: var(--accent); line-height: 1; }
.sx .l { font-size: 0.8rem; color: var(--text3); margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.hi { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow-sm); transition: all 0.2s; }
.hi:hover { border-color: var(--text3); }
.hi .inf { flex: 1; }
.hi .sym { font-weight: 700; font-size: 0.95rem; color: var(--text); }
.hi .met { font-size: 0.8rem; color: var(--text3); margin-top: 4px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.ib { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--card-border); background: var(--bg3); border-radius: var(--radius-xs); color: var(--text2); cursor: pointer; transition: all 0.2s; font-size: 1rem; }
.ib:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.ib.view:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.es { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; }
.eb { padding: 10px 16px; background: var(--bg2); border: 1px solid var(--card-border); border-radius: 100px; color: var(--text); font-family: var(--font); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); }
.eb i { font-size: 1.1rem; }
.eb:hover { border-color: var(--accent); color: var(--accent); background: var(--bg3); }

/* Overlay */
.ov { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.ov.open { display: flex; }
.oc { background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius-lg); max-width: 650px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 28px; position: relative; animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: var(--shadow-float); }
@keyframes scaleUp { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.ox { position: absolute; top: 16px; right: 16px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border: none; background: var(--bg3); border-radius: 50%; color: var(--text2); cursor: pointer; font-size: 1.4rem; transition: all 0.2s; }
.ox:hover { background: var(--red-bg); color: var(--red); transform: rotate(90deg); }
.rbtn { padding: 12px 24px; background: var(--bg3); border: 1px solid var(--card-border); border-radius: 100px; color: var(--text); font-family: var(--font); font-size: 0.9rem; cursor: pointer; transition: all 0.2s; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; }

.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 0.95rem; font-weight: 500; background: var(--bg2); border-radius: var(--radius); border: 1px dashed var(--card-border); }

/* === GCS und QSOFA Rechner === */
.gcs-grid { display: grid; gap: 8px; margin-bottom: 16px; }
.gcs-row { display: flex; flex-direction: column; gap: 4px; }
.gcs-row-title { font-size: 0.85rem; font-weight: 700; color: var(--text); display: flex; justify-content: space-between; }
.gcs-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.gcs-btn { flex: 1; min-width: 60px; padding: 8px; background: var(--bg3); border: 1px solid var(--card-border); border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; color: var(--text2); }
.gcs-btn:hover { border-color: var(--text3); color: var(--text); }
.gcs-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2); }
.qsf-box { padding: 12px; background: var(--bg3); border-radius: var(--radius-sm); border: 1px solid var(--card-border); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.qsf-box.on { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.qsf-score { font-size: 1.5rem; font-weight: 800; text-align: center; margin: 16px 0; font-family: var(--mono); }

/* === MODERN TRAINING UI === */
.trn-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.trn-header h3 { font-size: 1.2rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 8px; }
.trn-stats { display: flex; gap: 12px; }
.trn-stat { background: var(--bg2); padding: 6px 12px; border-radius: 100px; font-size: 0.85rem; font-weight: 700; border: 1px solid var(--card-border); box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 6px; }
.trn-stat i { color: var(--accent); font-size: 1.1rem; }
.trn-progress { height: 8px; background: var(--bg3); border-radius: 100px; overflow: hidden; margin-bottom: 24px; }
.trn-progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); border-radius: 100px; transition: width 0.4s ease; }

.trn-card { background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow); margin-bottom: 24px; position: relative; }
.trn-badge { position: absolute; top: -12px; left: 24px; background: var(--accent); color: white; padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3); }
.trn-scenario { font-size: 1.15rem; font-weight: 600; line-height: 1.5; color: var(--text); margin-top: 8px; }

.trn-q { font-size: 0.9rem; font-weight: 700; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.trn-opts { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 24px; }

.trn-opt { background: var(--bg2); border: 2px solid var(--card-border); border-radius: var(--radius); padding: 16px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-sm); }
.trn-opt:hover { border-color: var(--accent); background: var(--accent-bg); transform: translateY(-2px); }
.trn-opt.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2); }
.trn-opt.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
.trn-opt.dimmed { opacity: 0.4; filter: grayscale(1); pointer-events: none; }

.trn-lvl-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
.trn-lvl-btn { padding: 14px; border: 2px solid var(--card-border); border-radius: var(--radius-sm); font-weight: 700; background: var(--bg2); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.95rem; }

const SI_=document.getElementById('SI');
SI_.addEventListener('input',debounce(()=>{
  const q=SI_.value.trim().toLowerCase(),sB=document.getElementById('sB'),sC=document.getElementById('sC'),sH=document.getElementById('sH'),sR=document.getElementById('sR');
  if(q.length<2){sR.innerHTML='';sB.style.display='none';sH.style.display='block';return}
  sH.style.display='none';
  const ts=q.split(/[\s,;]+/).filter(t=>t.length>=2);
  let sc=D.map(d=>{
    let s=0,m=[];
    const indText = d.i ? Object.values(d.i).flat().join(' ').toLowerCase() : '';
    if(d.name.toLowerCase().includes(q)){s+=25;m.push(q)}
    if(indText.includes(q)){s+=15;m.push(q)}
    d.kw.forEach(k=>{if(k.includes(q)||q.includes(k)){s+=20;m.push(q)}});
    ts.forEach(t=>{
      d.kw.forEach(k=>{if(k===t)s+=12;else if(k.includes(t)){s+=8;m.push(t)}});
      if(d.name.toLowerCase().includes(t)){s+=10;m.push(t)}
      if(indText.includes(t)){s+=5;m.push(t)}
    });
    if(ts.length>1&&ts.every(t=>d.kw.some(k=>k.includes(t))||d.name.toLowerCase().includes(t)||indText.includes(t)))s+=18;
    return{...d,score:s,mt:[...new Set(m)]}
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  sB.style.display='flex';sC.innerHTML=`<b>${sc.length}</b> Treffer`;
  if(!sc.length){sR.innerHTML='<div class="empty"><i class="fa-solid fa-magnifying-glass" style="font-size:2rem;margin-bottom:8px;display:block"></i>Keine Diagramme gefunden.</div>';return}
  sR.innerHTML=sc.slice(0,15).map(x=>`<div class="card" onclick="shD(${x.id})"><div class="ch"><span class="ct">${hl(x.name,ts)}</span><span class="tb tb-${cl(x.c)}"><span class="td td-${cl(x.c)}"></span>${x.c}</span></div><div class="cs">Diagramm Nr. ${x.id}</div><div class="tags">${x.kw.filter(k=>x.mt.some(m=>k.includes(m))).slice(0,5).map(k=>`<span class="tag m">${k}</span>`).join('')}${x.kw.filter(k=>!x.mt.some(m=>k.includes(m))).slice(0,3).map(k=>`<span class="tag">${k}</span>`).join('')}</div></div>`).join('')
},150));

function bmS(key){
  document.querySelectorAll('.bz').forEach(x=>x.classList.toggle('on',x.dataset.r===key));
  document.querySelectorAll('.bm-pill').forEach(p=>p.classList.toggle('on',p.dataset.r===key));
  const rr=BR.find(x=>x.k===key);if(!rr)return;
  const ds=[...new Set(rr.ids)].map(id=>D.find(x=>x.id===id)).filter(Boolean);
  document.getElementById('bmR').innerHTML=`<h3 style="display:flex;align-items:center;gap:8px"><i class="fa-solid ${rr.icon}"></i> ${rr.n}</h3><div class="sub">${ds.length} verknüpfte Diagramme</div>${ds.map(d=>`<div class="bm-di" onclick="shD(${d.id})"><div><strong>${d.name}</strong><span>Nr. ${d.id}</span></div><i class="fa-solid fa-caret-right" style="color:var(--text3)"></i></div>`).join('')}`;
}

const dF_=document.getElementById('dF');
function rDiag(){document.getElementById('cF').innerHTML=`<button class="fb ${aCat===''?'a':''}" onclick="fC('')">Alle</button>${CATS.map(c=>`<button class="fb ${aCat===c?'a':''}" onclick="fC('${c}')">${c}</button>`).join('')}`;fR()}
function fC(c){aCat=c;rDiag()}
dF_.addEventListener('input',debounce(fR,150));
function fR(){const q=dF_.value.trim().toLowerCase();let f=D.slice();if(aCat)f=f.filter(d=>d.c===aCat);if(q.length>=2)f=f.filter(d=>d.name.toLowerCase().includes(q)||(d.i&&Object.values(d.i).flat().join(' ').toLowerCase().includes(q))||d.kw.some(k=>k.includes(q)));document.getElementById('dC').innerHTML=`<b>${f.length}</b> Diagramme`;document.getElementById('dL').innerHTML=f.map(d=>`<div class="card" onclick="shD(${d.id})"><div class="ch"><span class="ct">${d.id}. ${d.name}</span><span class="tb tb-${cl(d.c)}"><span class="td td-${cl(d.c)}"></span>${d.c}</span></div><div class="tags">${d.kw.slice(0,5).map(k=>`<span class="tag">${k}</span>`).join('')}${d.kw.length>5?`<span class="tag" style="opacity:.4">+${d.kw.length-5}</span>`:''}</div></div>`).join('')}

function getActions(lvl, diag) {
  let a = [];
  if (lvl === 1) a.push("Schockraum & Rea Team alarmieren", "Monitoring & O₂ max. anlegen", "Atemwegsmanagement vorbereiten", "PVK/IO Zugang legen");
  if (lvl === 2) {
    a.push("Arztkontakt < 10 Min. zwingend");
    if (diag.c === 'Kardiologisch') a.push("12 Kanal EKG (< 10 Min)", "PVK legen & Labor (Trop)", "Monitoring anlegen");
    else if (diag.c === 'Neurologisch') a.push("FAST Test Doku", "BZ sofort messen", "PVK legen & Labor", "Lyse/Thrombektomie Zeitfenster prüfen");
    else if (diag.c === 'Trauma') a.push("Trauma Check", "Immobilisation HWS/Ganzkörper", "Blutungskontrolle");
    else a.push("Monitoring anlegen", "PVK vorbereiten");
  }
  if (lvl === 3) {
    a.push("Arztkontakt < 30 Min.");
    a.push("Bei Fieber: Antipyrese nach Hausstandard");
    a.push("Bei Schmerz: Analgesie nach Hausstandard");
    if (diag.c === 'Chirurgisch' || diag.c === 'Trauma') a.push("Röntgenanforderung prüfen");
  }
  if (lvl === 4 || lvl === 5) {
    a.push("Normale Re Evaluation im Verlauf");
    if (diag.c === 'Trauma') a.push("Ggf. kühlen/hochlagern");
  }
  return a;
}

function shD(id){
  curDiag=D.find(x=>x.id===id);
  selR=[]; selI=[];
  curVit = { gcs: '', spo2: '', temp: '', nrs: '' };
  if(!curDiag)return;
  rOvl();
  document.getElementById('detO').classList.add('open');
}

function tgR(idx){
  if(selR.includes(idx)) selR=selR.filter(x=>x!==idx);
  else selR.push(idx);
  rOvl();
}

function tgI(lvl, idx, isGen){
  const key = `${lvl}-${idx}-${isGen?1:0}`;
  if(selI.includes(key)) selI=selI.filter(x=>x!==key);
  else selI.push(key);
  rOvl();
}

function updV(key, val) { curVit[key] = val; rOvl(); }
function updPed(val) { curPed = val; rOvl(); }

function rOvl(){
  const d=curDiag;
  let lvl=d.b||5;
  
  selI.forEach(k=>{ const l = parseInt(k.split('-')[0]); if(l < lvl) lvl = l; });

  if(d.r){
    d.r.forEach((r,i)=>{
      if(selR.includes(i)) {
        if(r.v < lvl) lvl = r.v;
        if(r.v > lvl) lvl = r.v; 
      }
    });
  }

  let vLvl = 5;
  if(curVit.gcs !== '') {
    const gcs = parseInt(curVit.gcs);
    if(gcs < 15) vLvl = Math.min(vLvl, 2);
    if(gcs < 12) vLvl = Math.min(vLvl, 1);
  }
  if(curVit.spo2 !== '') {
    const spo2 = parseInt(curVit.spo2);
    if(spo2 < 92) vLvl = Math.min(vLvl, 2);
  }
  if(curVit.temp !== '') {
    const temp = parseFloat(curVit.temp.replace(',','.'));
    if(temp > 41) vLvl = Math.min(vLvl, 2);
    else if(temp > 39) vLvl = Math.min(vLvl, 3);
  }
  if(curVit.nrs !== '') {
    const nrs = parseInt(curVit.nrs);
    if(nrs >= 8) vLvl = Math.min(vLvl, 3); 
    else if(nrs >= 5) vLvl = Math.min(vLvl, 4); 
  }
  lvl = Math.min(lvl, vLvl);

  const lObj = LV.find(x=>x.l===lvl);
  const rl = D.filter(x=>x.c===d.c&&x.id!==d.id);

  let html = `
    <button class="ox" onclick="clO()"><i class="fa-solid fa-xmark"></i></button>
    <span class="tb tb-${cl(d.c)}"><span class="td td-${cl(d.c)}"></span>${d.c}</span>
    <h2 style="font-size:1.3rem;font-weight:800;margin-top:12px;color:var(--text)">${d.id}. ${d.name}</h2>
    
    <div class="triage-banner t-b-${lvl}">
      <div style="display:flex;align-items:center;gap:8px"><i class="fa-solid fa-triangle-exclamation"></i> Stufe ${lvl} (${lObj.n})</div>
      <div class="t-time">Max: ${lObj.t}</div>
    </div>`;

  if(d.c === 'Pädiatrisch'){
    html += `<div style="background:var(--bg3);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;border:1px solid var(--card-border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h4 style="font-size:0.85rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px"><i class="fa-solid fa-baby"></i> Päd. Normwerte prüfen</h4>
        <select onchange="updPed(this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--card-border);font-family:var(--font);font-size:0.8rem;background:var(--bg2);color:var(--text);outline:none">
          <option value="0" ${curPed==='0'?'selected':''}>< 1 Monat</option>
          <option value="1" ${curPed==='1'?'selected':''}>1 bis 11 Monate</option>
          <option value="2" ${curPed==='2'?'selected':''}>1 bis 4 Jahre</option>
          <option value="3" ${curPed==='3'?'selected':''}>5 bis 12 Jahre</option>
          <option value="4" ${curPed==='4'?'selected':''}>> 12 Jahre</option>
        </select>
      </div>
      <div style="font-family:var(--mono);font-size:0.85rem;font-weight:700;color:var(--accent);text-align:center;padding:8px;background:var(--bg2);border-radius:6px;box-shadow:var(--shadow-sm);margin-bottom:8px;">
        ${pedsV[curPed]}
      </div>
      <div style="font-size:0.8rem;font-weight:600;color:var(--text2);text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;">
        <i class="fa-solid fa-weight-scale"></i> Geschätztes Gewicht: ${pedsW[curPed]}
      </div>
    </div>`;
  }

  html += `<h4 style="font-size:0.9rem;font-weight:700;margin-bottom:8px;color:var(--text)"><i class="fa-solid fa-heart-pulse"></i> Dynamische Vitals (Trigger sofort)</h4>
    <div class="vitals-grid">
      <div class="vital-input-box" style="position:relative; display:flex; flex-direction:column;">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          GCS (3 bis 15)
          <button onclick="openGCS()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:1.1rem;padding:0 4px;" title="GCS Rechner öffnen"><i class="fa-solid fa-calculator"></i></button>
        </label>
        <input type="number" min="3" max="15" value="${curVit.gcs}" onchange="updV('gcs', this.value)" style="margin-top:auto;">
      </div>
      <div class="vital-input-box">
        <label>SpO₂ (%)</label>
        <input type="number" min="0" max="100" value="${curVit.spo2}" onchange="updV('spo2', this.value)">
      </div>
      <div class="vital-input-box">
        <label>Temp (°C)</label>
        <input type="number" step="0.1" value="${curVit.temp}" onchange="updV('temp', this.value)">
      </div>
      <div class="vital-input-box">
        <label>NRS (0-10)</label>
        <input type="number" min="0" max="10" value="${curVit.nrs}" onchange="updV('nrs', this.value)">
      </div>
    </div>`;

  if(d.r && d.r.length > 0){
    html += `<div style="margin-bottom:20px;background:var(--orange-bg);border:1px solid var(--orange-border);border-radius:var(--radius-sm);padding:16px;">
      <h4 style="font-size:0.85rem;font-weight:800;color:var(--orange);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;display:flex;align-items:center;gap:6px"><i class="fa-solid fa-bolt"></i> SOP Höherstufungen</h4>
      <div style="display:flex;flex-direction:column;gap:8px">`;
    d.r.forEach((r,i)=>{
      const isSel = selR.includes(i);
      html += `<div class="rule-box ${isSel?'active':''}" onclick="tgR(${i})" style="margin:0;background:var(--bg2)">
        <input type="checkbox" ${isSel?'checked':''}>
        <div><div class="rule-txt">${r.l}</div><span class="rule-sub">${r.t}</span></div>
      </div>`;
    });
    html += `</div></div>`;
  }

  const act = getActions(lvl, d);
  if(act.length > 0) {
    html += `<div style="margin-bottom:20px;background:var(--bg3);border-radius:var(--radius-sm);padding:16px;border:1px solid var(--card-border)">
      <h4 style="font-size:0.9rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px"><i class="fa-solid fa-check-double"></i> Action Checklist für Stufe ${lvl}</h4>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${act.map(a => `<div class="rule-box" style="margin:0;padding:10px 12px" onclick="this.classList.toggle('active');this.querySelector('input').checked=!this.querySelector('input').checked">
          <input type="checkbox" style="margin-top:2px;transform:scale(1.1)">
          <span style="font-size:0.85rem;font-weight:600">${a}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }

  html += `<h4 style="font-size:0.9rem;font-weight:700;margin-bottom:6px;color:var(--text)"><i class="fa-solid fa-list-check"></i> Manuelle Indikatoren</h4>
           <div style="font-size:0.8rem;color:var(--text3);margin-bottom:12px;font-weight:500">Wähle alle zutreffenden Symptome von oben nach unten.</div>`;
  
  [1,2,3,4,5].forEach(l => {
    const genInds = GI[l] || [];
    const specInds = (d.i && d.i[l]) ? d.i[l] : [];
    if(genInds.length === 0 && specInds.length === 0) return;
    
    html += `<div class="ind-head t-b-${l}"><i class="fa-solid fa-circle" style="font-size:0.8em"></i> Stufe ${l}</div>`;
    
    specInds.forEach((ind, idx) => {
      const key = `${l}-${idx}-0`;
      const isSel = selI.includes(key);
      html += `<div class="ind-row" onclick="tgI(${l}, ${idx}, false)">
        <input type="checkbox" ${isSel?'checked':''}>
        <div class="ind-txt" style="font-weight:700">${ind}</div>
      </div>`;
    });

    genInds.forEach((ind, idx) => {
      const key = `${l}-${idx}-1`;
      const isSel = selI.includes(key);
      html += `<div class="ind-row" onclick="tgI(${l}, ${idx}, true)">
        <input type="checkbox" ${isSel?'checked':''}>
        <div class="ind-txt">${ind} <span style="opacity:0.6;font-size:0.75rem;font-weight:500">(Generell)</span></div>
      </div>`;
    });
  });

  if(rl.length){
    html += `<h4 style="font-size:0.85rem;font-weight:700;margin:24px 0 10px;color:var(--text)"><i class="fa-solid fa-folder-open"></i> Weitere Diagramme aus „${d.c}"</h4>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">${rl.map(r=>`<div class="card" style="margin:0;padding:12px 16px" onclick="shD(${r.id})"><div class="ch" style="margin:0"><span class="ct" style="font-size:0.9rem">${r.name}</span><span style="font-size:0.75rem;color:var(--text3);font-weight:600">Nr.${r.id}</span></div></div>`).join('')}</div>`;
  }

  html += `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:24px">
      <button class="rbtn primary" onclick="addH(${d.id}, ${lvl});clO()"><i class="fa-solid fa-check"></i> Speichern (${lObj.n})</button>
      <button class="rbtn" onclick="clO()">Abbrechen</button>
    </div>`;
    
  document.getElementById('oC').innerHTML=html;
}

function clO(){document.getElementById('detO').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){clO();clGCS();}});

function openGCS(){
  gcsS = {e:4, v:5, m:6};
  qsfS = {af:false, rr:false};
  document.getElementById('gcsO').classList.add('open');
  rGCS();
}

function setG(t, v){ gcsS[t] = v; rGCS(); }
function tqS(t){ qsfS[t] = !qsfS[t]; rGCS(); }
function clGCS(){ document.getElementById('gcsO').classList.remove('open'); }
function applyGCS(tot){
  updV('gcs', tot);
  clGCS();
}

function rGCS(){
  const ev = [
    {l:'Spontan',v:4}, {l:'Ansprache',v:3}, {l:'Schmerz',v:2}, {l:'Keine',v:1}
  ];
  const vv = [
    {l:'Orientiert',v:5}, {l:'Verwirrt',v:4}, {l:'Inadäquat',v:3}, {l:'Laute',v:2}, {l:'Keine',v:1}
  ];
  const mv = [
    {l:'Befolgt',v:6}, {l:'Gezielt',v:5}, {l:'Ungezielt',v:4}, {l:'Beugung',v:3}, {l:'Streckung',v:2}, {l:'Keine',v:1}
  ];
  
  const tot = gcsS.e + gcsS.v + gcsS.m;
  const qS = (qsfS.af?1:0) + (qsfS.rr?1:0) + (tot < 15 ? 1 : 0);
  
  document.getElementById('gcsC').innerHTML = `
    <button class="ox" onclick="clGCS()"><i class="fa-solid fa-xmark"></i></button>
    <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:16px;color:var(--text)"><i class="fa-solid fa-calculator"></i> GCS und qSOFA Rechner</h2>
    
    <div class="gcs-grid">
      <div class="gcs-row">
        <div class="gcs-row-title"><span>Augenöffnen</span> <span>${gcsS.e}</span></div>
        <div class="gcs-btns">
          ${ev.map(o=>`<button class="gcs-btn ${gcsS.e===o.v?'on':''}" onclick="setG('e',${o.v})">${o.l}</button>`).join('')}
        </div>
      </div>
      <div class="gcs-row" style="margin-top:8px">
        <div class="gcs-row-title"><span>Verbale Reaktion</span> <span>${gcsS.v}</span></div>
        <div class="gcs-btns">
          ${vv.map(o=>`<button class="gcs-btn ${gcsS.v===o.v?'on':''}" onclick="setG('v',${o.v})">${o.l}</button>`).join('')}
        </div>
      </div>
      <div class="gcs-row" style="margin-top:8px">
        <div class="gcs-row-title"><span>Motorische Reaktion</span> <span>${gcsS.m}</span></div>
        <div class="gcs-btns">
          ${mv.map(o=>`<button class="gcs-btn ${gcsS.m===o.v?'on':''}" onclick="setG('m',${o.v})">${o.l}</button>`).join('')}
        </div>
      </div>
    </div>

    <div class="qsf-score" style="color:${tot<=8?'var(--red)':tot<15?'var(--orange)':'var(--green)'}">
      Gesamt GCS: ${tot}
    </div>
    
    <h3 style="font-size:1.1rem;font-weight:800;margin:24px 0 12px;color:var(--text);border-top:1px solid var(--card-border);padding-top:16px"><i class="fa-solid fa-virus"></i> qSOFA Score</h3>
    <div class="qsf-box ${qsfS.af?'on':''}" onclick="tqS('af')">
      <span style="font-weight:700">Atemfrequenz &ge; 22 pro min</span>
      <i class="fa-solid ${qsfS.af?'fa-circle-check':'fa-circle'}" style="font-size:1.2rem"></i>
    </div>
    <div class="qsf-box ${qsfS.rr?'on':''}" onclick="tqS('rr')">
      <span style="font-weight:700">Systolischer Blutdruck &le; 100 mmHg</span>
      <i class="fa-solid ${qsfS.rr?'fa-circle-check':'fa-circle'}" style="font-size:1.2rem"></i>
    </div>
    <div class="qsf-box ${tot<15?'on':''}" style="cursor:default;opacity:0.8">
      <span style="font-weight:700">GCS unter 15</span>
      <i class="fa-solid ${tot<15?'fa-circle-check':'fa-circle'}" style="font-size:1.2rem"></i>
    </div>
    
    <div class="qsf-score" style="color:${qS>=2?'var(--red)':'var(--text2)'}">
      qSOFA Punkte: ${qS} von 3
    </div>
    ${qS>=2?'<div style="background:var(--red-bg);color:var(--red);padding:12px;border-radius:6px;font-size:0.85rem;font-weight:700;text-align:center;margin-bottom:16px;"><i class="fa-solid fa-triangle-exclamation"></i> Verdacht auf Sepsis!</div>':''}

    <button class="rbtn primary" style="width:100%;justify-content:center" onclick="applyGCS(${tot})">Werte übernehmen</button>
  `;
}

function addH(id, lvl){
  const d=D.find(x=>x.id===id);
  hist.unshift({id:d.id,name:d.name,c:d.c,ts:new Date().toISOString(),l:lvl});
  if(hist.length>200)hist=hist.slice(0,200);
  localStorage.setItem('mts_h',JSON.stringify(hist));
  rHist();
}
function rHist(){
  const t=hist.length,td=hist.filter(h=>new Date(h.ts).toDateString()===new Date().toDateString()).length,cc={};
  hist.forEach(h=>{cc[h.c]=(cc[h.c]||0)+1});
  const tp=Object.entries(cc).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stR').innerHTML=`<div class="sx"><div class="n">${t}</div><div class="l">Gesamt</div></div><div class="sx"><div class="n">${td}</div><div class="l">Heute</div></div><div class="sx"><div class="n">${Object.keys(cc).length}</div><div class="l">Kategorien</div></div><div class="sx"><div class="n" style="font-size:1rem;display:flex;align-items:center;justify-content:center;height:1.4rem;line-height:1.2">${tp?tp[0]:'Leer'}</div><div class="l">Top</div></div>`;
  const hl_=document.getElementById('hL');
  if(!hist.length){hl_.innerHTML='<div class="empty"><i class="fa-regular fa-clock" style="font-size:2rem;margin-bottom:8px;display:block"></i>Keine Zuordnungen bisher.</div>';return}
  hl_.innerHTML=hist.slice(0,50).map((h,i)=>{
    const d=new Date(h.ts);
    const lvlDot = h.l ? `<span class="td td-${h.l}" style="margin-right:6px"></span>Stufe ${h.l}` : '';
    return`<div class="hi"><div class="inf"><div class="sym">${h.name}</div><div class="met"><i class="fa-regular fa-calendar"></i> ${d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'})} ${d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} &bull; ${h.c} &bull; Nr.${h.id} <span style="margin-left:auto;font-weight:700;color:var(--text);display:flex;align-items:center">${lvlDot}</span></div></div><div class="act" style="display:flex;gap:6px;margin-left:12px"><button class="ib view" onclick="shD(${h.id})" title="Öffnen"><i class="fa-regular fa-eye"></i></button><button class="ib" onclick="rmH(${i})" title="Löschen"><i class="fa-solid fa-trash"></i></button></div></div>`
  }).join('')
}
function rmH(i){hist.splice(i,1);localStorage.setItem('mts_h',JSON.stringify(hist));rHist()}
function clrH(){if(!confirm('Verlauf wirklich komplett löschen?'))return;hist=[];localStorage.setItem('mts_h',JSON.stringify(hist));rHist()}
function expJ(){dl(new Blob([JSON.stringify({v:6,ts:new Date().toISOString(),hist},null,2)],{type:'application/json'}),'triageassist-backup-'+ds()+'.json')}
function expC(){let c='Datum;Uhrzeit;Nr;Diagramm;Kategorie;Level\n';hist.forEach(h=>{const d=new Date(h.ts);c+=`${d.toLocaleDateString('de-DE')};${d.toLocaleTimeString('de-DE')};${h.id};${h.name};${h.c};${h.l||''}\n`});dl(new Blob(['\ufeff'+c],{type:'text/csv;charset=utf-8'}),'triageassist-verlauf-'+ds()+'.csv')}
function impD(){document.getElementById('impF').click()}
function hImp(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(d.hist){hist=[...d.hist,...hist];localStorage.setItem('mts_h',JSON.stringify(hist))}alert('Import erfolgreich!');rHist()}catch{alert('Fehler beim Import.')}};r.readAsText(f);e.target.value=''}
function dl(b,n){const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
function ds(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function debounce(fn,ms){let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),ms)}}
function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

let trnIdx=0,trnAns=null,trnScore=0,trnDone=0,trnOrder=[];
function initTrain(){
  if(!trnOrder.length||trnDone>=trnOrder.length){trnOrder=shuffle([...Array(CASES.length).keys()]);trnIdx=0;trnAns=null;trnScore=0;trnDone=0;}
  rTrn();
}

function rTrn(){
  const ci=trnOrder[trnIdx];const c=CASES[ci];
  const diag=D.find(x=>x.id===c.diag);
  const opts=genOpts(c.diag);
  const pct=trnDone>0?Math.round(trnScore/trnDone*100):0;
  
  document.getElementById('trainArea').innerHTML=`
    <div class="trn-header">
      <h3><i class="fa-solid fa-user-graduate"></i> Fall ${trnDone+1} von ${CASES.length}</h3>
      <div class="trn-stats">
        <div class="trn-stat"><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> <span>${trnScore} / ${trnDone}</span></div>
        <div class="trn-stat"><i class="fa-solid fa-chart-line"></i> <span>${pct}%</span></div>
      </div>
    </div>
    
    <div class="trn-progress"><div class="trn-progress-bar" style="width:${(trnDone/CASES.length)*100}%"></div></div>
    
    <div class="trn-card">
      <div class="trn-badge">Szenario</div>
      <div class="trn-scenario">${c.s}</div>
    </div>

    <div class="trn-q"><i class="fa-solid fa-circle-question"></i> 1. Welches MTS Diagramm passt am besten?</div>
    <div class="trn-opts" id="tOpts">
      ${opts.map((o,i)=>{
        const dd=D.find(x=>x.id===o);
        let cls='trn-opt';
        if(trnAns!==null){
          if(o===c.diag)cls+=' correct';
          else if(i===trnAns&&o!==c.diag)cls+=' wrong';
          else cls+=' dimmed';
        }
        return`<div class="${cls}" ${trnAns===null?`onclick="trnAnswer(${i},${o},${c.diag})"`:''}>
          <span class="tb tb-${cl(dd.c)}"><span class="td td-${cl(dd.c)}"></span></span>
          <span style="flex:1">${dd.name}</span>
          ${trnAns!==null && o===c.diag ? '<i class="fa-solid fa-circle-check" style="font-size:1.4rem"></i>' : ''}
          ${trnAns!==null && i===trnAns && o!==c.diag ? '<i class="fa-solid fa-circle-xmark" style="font-size:1.4rem"></i>' : ''}
        </div>`;
      }).join('')}
    </div>

    ${trnAns!==null?`
      <div class="trn-q" style="margin-top:32px"><i class="fa-solid fa-traffic-light"></i> 2. Welche Dringlichkeitsstufe?</div>
      <div class="trn-lvl-grid" id="tLvl">
        ${[1,2,3,4,5].map(l=>{
          let cls='trn-lvl-btn';
          if(trnAns==='lvl' && l===c.lvl) cls+=' on';
          return`<div class="${cls}" ${trnAns==='lvl'?'':`onclick="trnLvl(${l},${c.lvl})"`}>
            <span class="td td-${l}"></span>${LV[l-1].n}
          </div>`;
        }).join('')}
      </div>
      
      ${trnAns==='lvl'?`
        <div class="trn-explain">
          <b><i class="fa-solid fa-lightbulb"></i> Begründung:</b>
          Stufe ${c.lvl} (${LV[c.lvl-1].n}) in "${diag.name}"<br><br>${c.ex}
        </div>
        <button class="trn-next" onclick="nextTrn()">Nächster Fall <i class="fa-solid fa-arrow-right"></i></button>
      `:''}
    `:''}
    
    ${trnDone>=CASES.length?`
      <div style="text-align:center;margin-top:40px">
        <h3 style="margin-bottom:12px;font-size:1.5rem;font-weight:800">Training abgeschlossen! 🎉</h3>
        <p style="color:var(--text2);margin-bottom:24px">Du hast ${trnScore} von ${CASES.length} Fällen korrekt zugeordnet.</p>
        <button class="rbtn primary" onclick="trnOrder=[];initTrain()"><i class="fa-solid fa-arrows-rotate"></i> Neue Runde starten</button>
      </div>
    `:''}
  `;
}

function trnAnswer(idx,chosen,correct){
  trnAns='diag';
  if(chosen===correct)trnScore++;
  const ci=trnOrder[trnIdx];const c=CASES[ci];
  const opts=genOpts(c.diag);
  document.querySelectorAll('#tOpts .trn-opt').forEach((el,i)=>{
    el.style.pointerEvents='none';
    if(opts[i]===c.diag)el.classList.add('correct');
    else if(i===idx&&opts[i]!==c.diag)el.classList.add('wrong');
    else el.classList.add('dimmed');
  });
  rTrn();
}
function trnLvl(chosen,correct){trnAns='lvl';rTrn()}
function nextTrn(){trnDone++;trnIdx=(trnIdx+1)%trnOrder.length;trnAns=null;rTrn()}

let _lastOpts={};
function genOpts(correctId){
  if(_lastOpts.id===correctId)return _lastOpts.opts;
  const wrong=D.filter(x=>x.id!==correctId).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.id);
  const all=[correctId,...wrong].sort(()=>Math.random()-.5);
  _lastOpts={id:correctId,opts:all};return all;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

rLvl();rCS();SI_.focus();
</script>
